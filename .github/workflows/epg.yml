name: EPG Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时运行一次
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ 安装Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          pip install requests

      # 4️⃣ 运行EPG合并
      - name: Run merge_epg
        run: |
          python merge_epg.py

      # 5️⃣ 提交生成结果
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add epg.xml.gz

          git commit -m "auto: update epg" || echo "no changes"

          git push
