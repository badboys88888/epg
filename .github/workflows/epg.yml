name: EPG Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 依赖
      - name: Install dependencies
        run: |
          pip install requests

      # 4️⃣ 生成 EPG
      - name: Generate EPG
        run: python merge_epg.py

      # 5️⃣ ⭐唯一入口（核心）
      - name: Build Channels (All-in-One)
        run: python extract_channels.py

      # 6️⃣ 提交
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add epg.xml.gz channels.json || true
          git commit -m "auto: update epg & channels" || echo "no changes"
          git push
