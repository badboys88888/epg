name: IPTV EPG Build

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时跑一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ===================== 1. 拉代码 =====================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================== 2. Python环境 =====================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ===================== 3. 升级pip =====================
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # ===================== 4. 安装依赖（关键） =====================
      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      # ===================== 5. 运行脚本 =====================
      - name: Run merge_epg
        run: |
          python merge_epg.py

      # ===================== 6. 提交结果 =====================
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add e.xml.gz epg_data.json index.json || true

          git commit -m "auto update epg" || exit 0
          git push
