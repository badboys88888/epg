name: IPTV EPG Engine v3

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时自动运行
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ===================== 拉取代码 ===================== #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===================== Python环境 ===================== #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ===================== 缓存pip（加速） ===================== #
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ===================== 安装依赖 ===================== #
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ===================== 运行EPG引擎 ===================== #
      - name: Run merge_epg engine
        run: |
          python merge_epg.py

      # ===================== 检查输出 ===================== #
      - name: Verify output files
        run: |
          echo "===== FILE LIST ====="
          ls -lah
          echo "====================="
          test -f output.m3u || echo "⚠️ output.m3u missing"
          test -f epg_data.json || echo "⚠️ epg_data.json missing"
          test -f e.xml.gz || echo "⚠️ e.xml.gz missing"

      # ===================== 提交结果 ===================== #
      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output.m3u epg_data.json e.xml.gz || true

          git commit -m "🚀 auto update epg $(date '+%Y-%m-%d %H:%M')" || echo "no changes"

          git push || echo "push skipped"
