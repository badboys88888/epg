name: EPG Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Generate EPG
        run: python merge_epg.py

      - name: Fetch logo map
        run: python fetch_logo_map.py

      # ⭐ 只生成参考 alias（不自动写入）
      - name: Generate Alias TXT (reference)
        run: python auto_alias.py

      - name: Generate Alias Map
        run: python gen_alias.py

      - name: Build Channels
        run: python extract_channels.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add epg.xml.gz channels.json icon_map.json alias_map.json alias_auto.txt || true

          git commit -m "auto: update epg & channels & logo & alias" || echo "no changes"

          git push
