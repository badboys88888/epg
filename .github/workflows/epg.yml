name: Build EPG Index

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时更新一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ===================== 拉代码 ===================== #
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================== Python环境 ===================== #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ===================== 安装依赖 ===================== #
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ===================== 运行EPG合并 ===================== #
      - name: Run merge_epg
        run: |
          python merge_epg.py

      # ===================== （可选）测试matcher ===================== #
      - name: Test matcher
        run: |
          python matcher.py

      # ===================== 提交结果 ===================== #
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add epg_entities.json index.json

          git commit -m "update epg index" || echo "no changes"

          git push
