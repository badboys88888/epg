name: build epg

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write   # ⭐ 关键修复

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python merge_epg.py

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add e.xml epg_data.json
          git commit -m "update epg" || echo "no change"
          git push
