name: build epg

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python merge_epg.py

      - name: commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          echo "checking files..."
          ls -lh

          # 🔥 关键：永远不会写错文件名
          git add e.xml.gz epg_data.json || true

          git commit -m "update epg" || echo "no change"
          git push
