name: EPG Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时执行一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          pip install requests

      # 4️⃣ 生成 EPG
      - name: Generate EPG
        run: |
          python merge_epg.py

      # 5️⃣ 提取频道
      - name: Extract channels
        run: |
          python extract_channels.py

      # 6️⃣ ⭐ 新增：匹配 logo（关键步骤）
      - name: Merge channel logos
        run: |
          python build_channels.py

      # 7️⃣ 提交结果回仓库
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add epg.xml.gz channels.json || true

          git commit -m "auto: update epg & channels" || echo "no changes"

          git push
